kind: DataContract
apiVersion: v3.0.0
id: week3-extractions
info:
  title: Week 3 Extractions Contract
  version: 1.0.0
  owner: week7-contract-generator
  description: Generated from the live Week 3 extraction output using profiling-based
    inference. The contract reflects the real source file currently present in outputs/week3/extractions.jsonl.
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract generated from observed Week 3 output.
  limitations: Generated from the current live Week 3 export, which still uses a legacy
    summary schema.
observations:
  generated_at: '2026-04-01T12:49:35.697538+00:00'
  record_count: 50
  profiled_row_count: 50
  flatten_mode: record_level_fallback
  repeated_field: null
  observed_keys:
  - document_id
  - source_filename
  - strategy_used
  - confidence_score
  - escalation_triggered
  - escalation_reason
  - estimated_cost
  - processing_time_s
  - flagged_for_review
  warnings:
  - The current Week 3 file does not contain extracted_facts[]. Profiling will fall
    back to one row per record instead of one row per fact.
  - 'The current source uses a legacy summary schema and is missing canonical fields:
    doc_id, entities, extracted_facts, source_hash, source_path'
  - This contract was generated from record-level summary rows because extracted_facts[]
    was not present in the live Week 3 file.
schema:
  document_id:
    type: string
    required: true
    pattern: ^[a-f0-9]{12}$
    description: Identifier emitted by the current Week 3 pipeline for the processed
      document.
    profile:
      dtype: string
      null_fraction: 0.0
      cardinality_estimate: 40
      sample_values:
      - 88145efb1c21
      - 276fc7bc8deb
      - 977015043cfd
      - c7d87eb9189d
      - acac5a3feda8
  source_filename:
    type: string
    required: true
    description: Original source filename for the processed document.
    profile:
      dtype: string
      null_fraction: 0.0
      cardinality_estimate: 40
      sample_values:
      - CBE ANNUAL REPORT 2023-24.pdf
      - Audit Report - 2023.pdf
      - fta_performance_survey_final_report_2022.pdf
      - tax_expenditure_ethiopia_2021_22.pdf
      - Annual_Report_JUNE-2023.pdf
  strategy_used:
    type: string
    required: true
    enum:
    - layout_aware
    - vision_augmented
    - ocr_heavy
    description: Extraction strategy selected by the Week 3 pipeline for this document.
    profile:
      dtype: string
      null_fraction: 0.0
      cardinality_estimate: 3
      sample_values:
      - layout_aware
      - vision_augmented
      - ocr_heavy
  confidence_score:
    type: number
    required: true
    minimum: 0.0
    maximum: 1.0
    description: Document-level confidence score for the current extraction output.
      This must remain a 0.0-1.0 numeric value; changing it to 0-100 is a breaking
      change.
    profile:
      dtype: number
      null_fraction: 0.0
      cardinality_estimate: 14
      sample_values:
      - '1.0'
      - '0.15'
      - '0.55'
      - '0.9'
      - '0.727'
      observed_min: 0.0
      observed_max: 1.0
      observed_mean: 0.549294
      observed_stddev: 0.40967
      observed_p50: 0.72645
      observed_p95: 1.0
  escalation_triggered:
    type: boolean
    required: true
    description: Whether the document was escalated for additional handling.
    profile:
      dtype: boolean
      null_fraction: 0.0
      cardinality_estimate: 2
      sample_values:
      - 'False'
      - 'True'
  escalation_reason:
    type: string
    enum:
    - 'page-level escalation: 3 pages below 0.4 confidence'
    description: Recorded reason for escalation when escalation was triggered.
    profile:
      dtype: string
      null_fraction: 0.76
      cardinality_estimate: 1
      sample_values:
      - 'page-level escalation: 3 pages below 0.4 confidence'
  estimated_cost:
    type: string
    required: true
    enum:
    - medium
    - high
    description: Cost tier assigned to the extraction run.
    profile:
      dtype: string
      null_fraction: 0.0
      cardinality_estimate: 2
      sample_values:
      - medium
      - high
  processing_time_s:
    type: number
    required: true
    description: Observed processing time in seconds for the extraction run.
    profile:
      dtype: number
      null_fraction: 0.0
      cardinality_estimate: 49
      sample_values:
      - '36.2052'
      - '0.3413'
      - '30.5978'
      - '19.8513'
      - '43.0423'
      observed_min: 0.0071
      observed_max: 279.256
      observed_mean: 27.084928
      observed_stddev: 60.393889
      observed_p50: 0.53805
      observed_p95: 170.8967
  flagged_for_review:
    type: boolean
    required: true
    description: Whether the pipeline flagged the document for manual review.
    profile:
      dtype: boolean
      null_fraction: 0.0
      cardinality_estimate: 2
      sample_values:
      - 'False'
      - 'True'
quality:
  type: SodaChecks
  specification:
    checks for week3_extractions:
    - row_count >= 1
    - missing_count(document_id) = 0
    - missing_count(source_filename) = 0
    - missing_count(strategy_used) = 0
    - missing_count(confidence_score) = 0
    - min(confidence_score) >= 0.0
    - max(confidence_score) <= 1.0
    - missing_count(escalation_triggered) = 0
    - missing_count(estimated_cost) = 0
    - missing_count(processing_time_s) = 0
    - missing_count(flagged_for_review) = 0
lineage:
  source_snapshot: outputs/week4/lineage_snapshots.jsonl
  snapshot_format: whole-file-json
  snapshot_summary:
    dataset_count: 25
    transformation_count: 13
    edge_count: 30
  upstream: []
  downstream: []
  notes:
  - No explicit Week 3 consumer nodes were found in the provided Week 4 lineage snapshot.
  - The latest lineage file is a dbt-style graph with datasets, transformations, and
    edges, so blast-radius details will become stronger after Week 4 is migrated to
    the canonical snapshot schema.
