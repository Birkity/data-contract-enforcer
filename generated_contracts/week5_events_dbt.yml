        values:
        - AgentSession
        - ComplianceCheck
        - CreditAnalysis
        - DocumentPackage
        - FraudScreening
        - Loan
  - name: sequence_number
    description: Monotonic sequence number within the aggregate stream.
    tests:
    - not_null
  - name: schema_version
    description: Version of the payload schema used to serialize the event.
    tests:
    - not_null
