version: 1
updated_at: 2026-04-02T16:20:00Z
notes:
  - Registry subscriptions are the primary source of blast-radius reasoning in the updated Week 7 architecture.
  - Lineage remains useful, but only as enrichment for internal propagation once a subscribed consumer has already been identified.
  - Some subscriber links below are Week 7 equivalents of the Week 6-style consumer boundary described in the updated docs.
subscriptions:
  - contract_id: week3-extractions
    subscriber_id: week4-brownfield-cartographer
    fields_consumed:
      - doc_id
      - extracted_facts
      - extracted_facts[].confidence
      - entities
    breaking_fields:
      - field: extracted_facts[].confidence
        reason: Confidence scale drives trust weighting and graph annotation quality in downstream cartography.
      - field: doc_id
        reason: Stable document identity is required to link extraction outputs to lineage or graph nodes.
    validation_mode: WARN
    registered_at: 2026-04-02T16:20:00Z
    contact:
      owner: Week 4 Brownfield Cartographer
      role: downstream consumer
      email: birkity.yishak.m@gmail.com
  - contract_id: week3-extractions
    subscriber_id: week7-contract-generator
    fields_consumed:
      - doc_id
      - extracted_facts
      - extracted_facts[].confidence
      - entities
      - extraction_model
    breaking_fields:
      - field: extracted_facts
        reason: The generator depends on the nested fact structure to flatten the dataset and infer fact-level clauses.
      - field: extracted_facts[].confidence
        reason: Range and drift clauses are generated from the observed fact confidence distribution.
    validation_mode: AUDIT
    registered_at: 2026-04-02T16:20:00Z
    contact:
      owner: Week 7 Contract Generator
      role: contract consumer
      email: birkity.yishak.m@gmail.com
  - contract_id: week3-extractions
    subscriber_id: week7-validation-runner
    fields_consumed:
      - doc_id
      - extracted_facts[].confidence
      - source_hash
      - extracted_at
    breaking_fields:
      - field: extracted_facts[].confidence
        reason: Confidence is a critical semantic field and should block on range or high-severity drift in enforce mode.
      - field: source_hash
        reason: Hash integrity is used as part of the contract's structural guarantees.
    validation_mode: ENFORCE
    registered_at: 2026-04-02T16:20:00Z
    contact:
      owner: Week 7 Validation Runner
      role: enforcement consumer
      email: birkity.yishak.m@gmail.com
  - contract_id: week4-lineage-snapshots
    subscriber_id: week7-violation-attributor
    fields_consumed:
      - datasets
      - edges
      - transformations
    breaking_fields:
      - field: edges
        reason: Edge connectivity is required for lineage enrichment during attribution.
      - field: transformations
        reason: Transformation metadata supplies the candidate source file path used for blame reasoning.
    validation_mode: WARN
    registered_at: 2026-04-02T16:20:00Z
    contact:
      owner: Week 7 Violation Attributor
      role: lineage enrichment consumer
      email: birkity.yishak.m@gmail.com
  - contract_id: week5-events
    subscriber_id: week7-event-contract-consumer
    fields_consumed:
      - event_id
      - aggregate_id
      - aggregate_type
      - sequence_number
      - payload
      - occurred_at
    breaking_fields:
      - field: sequence_number
        reason: Sequence ordering is required for event-stream correctness and replay semantics.
      - field: aggregate_id
        reason: Aggregate identity is needed to group event streams and reason about monotonicity.
    validation_mode: WARN
    registered_at: 2026-04-02T16:20:00Z
    contact:
      owner: Week 7 Event Contract Consumer
      role: downstream consumer
      email: birkity.yishak.m@gmail.com
  - contract_id: langsmith-trace-record
    subscriber_id: week7-trace-contract-consumer
    fields_consumed:
      - id
      - run_type
      - total_tokens
      - start_time
      - end_time
    breaking_fields:
      - field: run_type
        reason: Trace routing and validation logic depend on stable run-type semantics.
      - field: total_tokens
        reason: Token arithmetic is used to validate telemetry integrity and cost reasoning.
    validation_mode: AUDIT
    registered_at: 2026-04-02T16:20:00Z
    contact:
      owner: Week 7 Trace Contract Consumer
      role: ai telemetry consumer
      email: birkity.yishak.m@gmail.com
