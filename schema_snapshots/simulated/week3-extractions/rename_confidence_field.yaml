registry:
  role: primary_blast_radius_source
  path: contract_registry/subscriptions.yaml
  subscriber_count: 3
  subscriptions:
  - subscriber_id: week4-brownfield-cartographer
    fields_consumed:
    - doc_id
    - extracted_facts
    - extracted_facts[].confidence
    - entities
    breaking_fields:
    - field: extracted_facts[].confidence
      reason: Confidence scale drives trust weighting and graph annotation quality in downstream cartography.
    - field: doc_id
      reason: Stable document identity is required to link extraction outputs to lineage or graph nodes.
    validation_mode: WARN
    registered_at: 2026-04-02 16:20:00+00:00
    contact:
      owner: Week 4 Brownfield Cartographer
      role: downstream consumer
      email: birkity.yishak.m@gmail.com
    contact_summary: Week 4 Brownfield Cartographer | downstream consumer | birkity.yishak.m@gmail.com
  - subscriber_id: week7-contract-generator
    fields_consumed:
    - doc_id
    - extracted_facts
    - extracted_facts[].confidence
    - entities
    - extraction_model
    breaking_fields:
    - field: extracted_facts
      reason: The generator depends on the nested fact structure to flatten the dataset and infer fact-level
        clauses.
    - field: extracted_facts[].confidence
      reason: Range and drift clauses are generated from the observed fact confidence distribution.
    validation_mode: AUDIT
    registered_at: 2026-04-02 16:20:00+00:00
    contact:
      owner: Week 7 Contract Generator
      role: contract consumer
      email: birkity.yishak.m@gmail.com
    contact_summary: Week 7 Contract Generator | contract consumer | birkity.yishak.m@gmail.com
  - subscriber_id: week7-validation-runner
    fields_consumed:
    - doc_id
    - extracted_facts[].confidence
    - source_hash
    - extracted_at
    breaking_fields:
    - field: extracted_facts[].confidence
      reason: Confidence is a critical semantic field and should block on range or high-severity drift
        in enforce mode.
    - field: source_hash
      reason: Hash integrity is used as part of the contract's structural guarantees.
    validation_mode: ENFORCE
    registered_at: 2026-04-02 16:20:00+00:00
    contact:
      owner: Week 7 Validation Runner
      role: enforcement consumer
      email: birkity.yishak.m@gmail.com
    contact_summary: Week 7 Validation Runner | enforcement consumer | birkity.yishak.m@gmail.com
  notes:
  - Registry subscriptions are the primary source of blast-radius reasoning for this contract.
  - Registry subscriptions are the primary source of blast-radius reasoning in the updated Week 7 architecture.
  - Lineage remains useful, but only as enrichment for internal propagation once a subscribed consumer
    has already been identified.
  - Some subscriber links below are Week 7 equivalents of the Week 6-style consumer boundary described
    in the updated docs.
lineage:
  role: enrichment_only
  source_snapshot:
    path: outputs/week4/lineage_snapshots.jsonl
    load_mode: whole-file-json
  downstream_enrichment: []
  notes:
  - Week 4 lineage is currently a dbt-style whole-file graph, not the canonical Week 7 node/edge snapshot.
  - No explicit consumer for the current source dataset was found in the current lineage file, so lineage
    enrichment is partial.
